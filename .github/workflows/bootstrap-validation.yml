name: Bootstrap validation
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: ASGK doctor
        run: python3 scripts/asgk.py doctor
      - name: PR policy gate
        if: github.event_name == 'pull_request'
        run: python3 scripts/asgk.py policy-gate --github-event "$GITHUB_EVENT_PATH"
      - name: Negative policy gate fixtures
        run: python3 scripts/asgk.py negative policy-gate
      - name: Positive handoff fixture
        run: python3 scripts/asgk.py handoff-check --file examples/handoff_packet.valid.yaml --fail-on-todo
      - name: Negative check PR body missing merge decision
        run: |
          if python3 scripts/asgk.py pr-body-check --file examples/negative/pr_body.no-merge-decision.md; then
            echo "Expected PR-body missing Merge Decision fixture to fail, but it passed."
            exit 1
          fi
      - name: Negative check PR body chat authority
        run: |
          suffix=chat
          if python3 scripts/asgk.py pr-body-check --file examples/negative/pr_body.see-${suffix}.md; then
            echo "Expected PR-body chat-authority fixture to fail, but it passed."
            exit 1
          fi
      - name: Negative check task packet chat authority
        run: |
          suffix=chat
          if python3 scripts/asgk.py task-packet-check --file examples/negative/task_packet.see-${suffix}.yaml; then
            echo "Expected task-packet chat-authority fixture to fail, but it passed."
            exit 1
          fi
      - name: Negative check task packet missing stop conditions
        run: |
          if python3 scripts/asgk.py task-packet-check --file examples/negative/task_packet.no-stop.yaml; then
            echo "Expected task-packet missing stop_conditions fixture to fail, but it passed."
            exit 1
          fi
      - name: Negative check handoff missing active issue
        run: |
          if python3 scripts/asgk.py handoff-check --file examples/negative/handoff.missing-active-issue.yaml; then
            echo "Expected handoff missing active_issue fixture to fail, but it passed."
            exit 1
          fi
      - name: Negative check handoff empty next safe action
        run: |
          if python3 scripts/asgk.py handoff-check --file examples/negative/handoff.empty-next-safe-action.yaml; then
            echo "Expected handoff empty next_safe_action fixture to fail, but it passed."
            exit 1
          fi
      - name: Negative check handoff unknown validation status
        run: |
          if python3 scripts/asgk.py handoff-check --file examples/negative/handoff.unknown-validation-status.yaml; then
            echo "Expected handoff unknown validation_status fixture to fail, but it passed."
            exit 1
          fi
      - name: Negative check handoff missing allowed paths
        run: |
          if python3 scripts/asgk.py handoff-check --file examples/negative/handoff.missing-allowed-paths.yaml; then
            echo "Expected handoff missing allowed_paths fixture to fail, but it passed."
            exit 1
          fi
      - name: Negative check handoff missing must read
        run: |
          if python3 scripts/asgk.py handoff-check --file examples/negative/handoff.missing-must-read.yaml; then
            echo "Expected handoff missing must_read fixture to fail, but it passed."
            exit 1
          fi
