name: Bootstrap validation
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/check_project.py
      - run: python3 scripts/validate_bootstrap.py
      - run: git diff --check
